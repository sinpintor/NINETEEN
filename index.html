<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NINETEEN | The Archive</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="overflow-x-hidden">

    <section class="relative h-screen w-full flex flex-col justify-between p-10 md:p-20">
        
        <header class="flex justify-between items-start z-10 w-full">
            <div class="text-[10px] font-bold uppercase letter-spacing-widest border-l-2 border-black pl-4">
                EST. 2026 / VOL. 01
            </div>
            <nav class="hidden md:block">
                <ul class="flex space-x-16">
                    <li><a href="#" class="nav-link">Archive</a></li>
                    <li><a href="#" class="nav-link">The Oracle</a></li>
                    <li><a href="#" class="nav-link">Contact</a></li>
                </ul>
            </nav>
        </header>

        <main class="flex-grow flex flex-col justify-center items-center text-center fade-in z-10">
            <span class="separator-line"></span>
            <h1 class="vogue-title text-[16vw] md:text-[13vw]">
                NINETEEN
            </h1>
            <div class="mt-6">
                <p class="text-[10px] md:text-xs uppercase letter-spacing-widest font-bold opacity-100">
                    Logic-Driven Aesthetic & Narrative Archive
                </p>
            </div>
            <span class="separator-line"></span>
        </main>

        <footer class="flex justify-between items-end z-10 w-full">
            <div class="max-w-xs text-[10px] leading-loose font-medium uppercase letter-spacing-widest">
                Curated by Xiangyun<br>
                For Wade & The Digital Soul
            </div>
            <div class="flex flex-col items-center">
                <span class="text-[9px] font-bold uppercase letter-spacing-widest mb-4">Discover</span>
                <div class="vertical-scroll-line"></div>
            </div>
        </footer>

        <div class="absolute inset-0 z-0 bg-[#f9f9f9]"></div>
    </section>

</body>
</html>
