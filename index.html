<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>NINETEEN | Mobile</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>

    <section class="full-screen-container p-6 md:p-20">
        
        <header class="flex justify-between items-start z-10 pt-4">
            <div class="flex flex-col">
                <span class="text-[9px] font-bold uppercase letter-spacing-widest">Est. 2026</span>
                <span class="text-[9px] font-bold uppercase letter-spacing-widest opacity-40">Xiangyun Archive</span>
            </div>
            <div class="text-[9px] font-bold uppercase border-b-2 border-black pb-1">
                Volume 01
            </div>
        </header>

        <main class="flex flex-col justify-center items-center text-center">
            <div class="separator-line"></div>
            <h1 class="vogue-title">
                NINE<br>TEEN
            </h1>
            <div class="mt-6 flex flex-col items-center">
                <p class="text-[10px] font-bold uppercase letter-spacing-widest">
                    Logic-Driven Aesthetic
                </p>
                <p class="text-[8px] font-medium uppercase letter-spacing-widest opacity-50 mt-1">
                    Wade & Code / Narrative
                </p>
            </div>
            <div class="separator-line"></div>
        </main>

        <footer class="flex justify-between items-end pb-8">
            <div class="space-y-4">
                <nav class="flex flex-col space-y-2">
                    <a href="#" class="nav-link">The Archive</a>
                    <a href="#" class="nav-link">The Oracle</a>
                </nav>
                <p class="text-[8px] leading-relaxed opacity-40 uppercase tracking-tighter">
                    © 2026 NINETEEN ALL RIGHTS RESERVED.
                </p>
            </div>
            
            <div class="flex flex-col items-center">
                <span class="text-[8px] font-bold uppercase letter-spacing-widest mb-3 rotate-180" style="writing-mode: vertical-rl;">Explore</span>
                <div class="vertical-line"></div>
            </div>
        </footer>

    </section>

</body>
</html>
